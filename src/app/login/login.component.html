<section class="login-layout">
  <form class="login-card section-card field-grid" (ngSubmit)="submit()">
    <div class="mode-switch" role="tablist" aria-label="Authentication mode">
      <button
        type="button"
        class="mode-btn"
        [class.mode-btn-active]="mode() === 'login'"
        (click)="toggleMode('login')"
      >
        {{ i18n.t('login.submit') }}
      </button>
      <button
        type="button"
        class="mode-btn"
        [class.mode-btn-active]="mode() === 'register'"
        (click)="toggleMode('register')"
      >
        Создать аккаунт
      </button>
    </div>

    <h1 class="section-title">{{ i18n.t('login.title') }}</h1>
    <p class="section-text">
      {{ mode() === 'login' ? i18n.t('login.subtitle') : 'Создайте новый аккаунт, чтобы сразу бронировать туры.' }}
    </p>

    @if (error()) {
      <p class="error-message">{{ error() }}</p>
    }

    @if (mode() === 'register') {
      <label>
        Имя и фамилия
        <input type="text" name="name" [(ngModel)]="name" required />
      </label>
    }

    <label>
      {{ i18n.t('login.email') }}
      <input type="email" name="email" [(ngModel)]="email" required />
    </label>

    <label>
      {{ i18n.t('login.password') }}
      <input type="password" name="password" [(ngModel)]="password" required />
    </label>

    @if (mode() === 'register') {
      <label>
        Подтвердите пароль
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required />
      </label>
    }

    <button class="primary-btn" type="submit" [disabled]="loading()">
      {{
        loading()
          ? i18n.t('booking.loading')
          : mode() === 'login'
            ? i18n.t('login.submit')
            : 'Создать аккаунт'
      }}
    </button>
  </form>
</section>
